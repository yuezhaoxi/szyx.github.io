<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>回合策略对战</title>
    <style>
        *{
            margin:0;padding:0;box-sizing:border-box;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }
        body{
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;text-align: center;padding: 15px;
            min-height: 100vh;display: flex;justify-content: center;align-items: center;
        }
        .box{
            width: 100%;max-width: 500px;
            background: rgba(22, 33, 62, 0.95);
            padding: 20px 15px;border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }
        .cover{display: flex;flex-direction: column;align-items: center;justify-content: center;min-height: 60vh;}
        .cover-icon{
            width: 120px;height: 120px;object-fit: contain;
            border-radius: 20px;margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            background: #0a1628;padding: 10px;
        }
        @keyframes float{
            0%,100%{transform:translateY(0px)}
            50%{transform:translateY(-10px)}
        }
        .cover h1{font-size:2em;color:#e94560;margin-bottom:5px;letter-spacing:3px;}
        .cover .subtitle{color:#a8b8d0;font-size:0.9em;margin-bottom:25px;}
        .tutorial{
            background:#0a1628;border-radius:12px;padding:18px;
            margin:20px 0;text-align:left;width:100%;border:1px solid #1a2a4a;
        }
        .tutorial h3{color:#e94560;margin-bottom:12px;font-size:1em;text-align:center;}
        .tutorial-item{display:flex;align-items:center;margin:8px 0;font-size:0.85em;color:#c0d0e0;}
        .tutorial-icon{font-size:1.3em;margin-right:10px;min-width:30px;text-align:center;}
        .btn-cover-group{display:flex;flex-direction:column;gap:12px;width:100%;margin-top:10px;}
        .btn-start,.btn-create,.btn-join{
            padding:14px 40px;border:none;border-radius:30px;color:#fff;
            font-size:1.1em;font-weight:bold;cursor:pointer;letter-spacing:2px;
            transition:all 0.3s ease;
            -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;
        }
        .btn-start:active,.btn-create:active,.btn-join:active{transform:scale(0.95)}
        .btn-start{
            padding:16px 50px;font-size:1.2em;
            background:linear-gradient(135deg,#e94560,#c73650);
            box-shadow:0 6px 20px rgba(233,69,96,0.4);
            animation:pulse 2s infinite;
        }
        @keyframes pulse{
            0%,100%{box-shadow:0 6px 20px rgba(233,69,96,0.4)}
            50%{box-shadow:0 6px 30px rgba(233,69,96,0.7)}
        }
        .btn-create{background:linear-gradient(135deg,#533a7b,#3d2a5e);box-shadow:0 6px 20px rgba(83,58,123,0.4)}
        .btn-create:active{background:#2d1f45}
        .btn-join{background:linear-gradient(135deg,#1a6b4a,#145230);box-shadow:0 6px 20px rgba(26,107,74,0.4)}
        .btn-join:active{background:#0e3d25}

        /* 弹窗 */
        .modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center;}
        .modal-overlay.show{display:flex}
        .modal{background:#16213e;border-radius:16px;padding:25px 20px;width:90%;max-width:400px;text-align:center;border:2px solid #533a7b;}
        .modal h3{color:#e94560;margin-bottom:15px;font-size:1.2em;}
        .modal .option-row{display:flex;align-items:center;justify-content:space-between;margin:15px 0;padding:10px;background:#0a1628;border-radius:10px;}
        .modal .option-row.col{flex-direction:column;gap:10px;align-items:stretch;}
        .modal .option-row label{font-size:0.95em;color:#c0d0e0;}
        .modal select,.modal input{padding:10px 12px;border-radius:8px;border:1px solid #3a5080;background:#0f3460;color:#fff;font-size:1em;text-align:center;width:140px;-webkit-appearance:none;appearance:none;}
        .modal input{cursor:text;width:100%;}
        .modal input::placeholder{color:#6a80a0;}
        .modal input:focus,.modal select:focus{outline:none;border-color:#e94560}
        .btn-confirm{padding:12px 40px;background:linear-gradient(135deg,#e94560,#c73650);border:none;border-radius:25px;color:#fff;font-size:1em;font-weight:bold;cursor:pointer;margin-top:10px;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        .btn-confirm:active{transform:scale(0.95)}
        .btn-confirm.green{background:linear-gradient(135deg,#4caf84,#3a8a60)}
        .btn-confirm.red{background:linear-gradient(135deg,#e94560,#a02030)}
        .modal .btn-cancel{margin-top:10px;padding:10px;background:transparent;border:1px solid #3a5080;border-radius:10px;color:#a8b8d0;font-size:0.9em;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        .modal .btn-cancel:active{background:#0f3460}

        /* 房间界面 */
        .room-screen{display:none;flex-direction:column;align-items:center;}
        .room-header{display:flex;align-items:center;justify-content:space-between;width:100%;margin-bottom:15px;}
        .room-header h2{font-size:1.3em;color:#e94560;letter-spacing:2px;flex:1;}
        .btn-leave-room{background:transparent;border:1px solid #e94560;color:#e94560;padding:8px 14px;border-radius:8px;font-size:0.8em;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        .btn-leave-room:active{background:rgba(233,69,96,0.2)}
        .room-card{background:#0a1628;border-radius:16px;padding:20px;width:100%;border:2px solid #533a7b;margin-bottom:15px;}
        .room-code{font-size:2em;font-weight:bold;color:#e94560;letter-spacing:6px;margin:10px 0;background:#0f3460;padding:8px 15px;border-radius:10px;border:1px dashed #e94560;}
        .room-info{color:#a8b8d0;font-size:0.85em;margin:8px 0;}
        .room-role-badge{display:inline-block;padding:4px 12px;border-radius:15px;font-size:0.8em;font-weight:bold;margin:5px 0;}
        .role-host{background:#e94560;color:#fff}
        .role-member{background:#4caf84;color:#fff}
        .player-list{width:100%;margin-top:15px;}
        .player-list h4{color:#a8b8d0;margin-bottom:10px;font-size:0.95em;}
        .player-slot{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;margin:6px 0;background:#0f3460;border-radius:8px;font-size:0.9em;position:relative;}
        .player-slot .player-info{display:flex;align-items:center;gap:8px;flex:1;cursor:default;}
        .player-slot .player-info.editable{cursor:pointer;}
        .player-slot .player-info.editable:hover{opacity:0.8;}
        .player-slot .edit-icon{font-size:0.7em;color:#a8b8d0;margin-left:2px;}
        .player-slot .player-actions{display:flex;gap:6px;align-items:center;}
        .player-slot.host{border-left:3px solid #e94560;background:#1a1a40}
        .player-slot.self{border-left:3px solid #4caf84;background:#0a2a1a}
        .player-slot.bot{border-left:3px solid #f0a500;background:#1a2510}
        .player-slot.other{border-left:3px solid #3a80d0;background:#0a1a30}
        .player-slot.empty{border-left:3px solid #3a5080;opacity:0.5;background:#0a1628}
        .player-tag{font-size:0.7em;padding:3px 8px;border-radius:10px;font-weight:bold;}
        .tag-host{background:#e94560;color:#fff}
        .tag-self{background:#4caf84;color:#fff}
        .tag-bot{background:#f0a500;color:#000}
        .tag-waiting{background:#3a5080;color:#a8b8d0}
        .tag-player{background:#3a80d0;color:#fff}
        .btn-kick{background:transparent;border:1px solid #e94560;color:#e94560;padding:3px 8px;border-radius:6px;font-size:0.7em;cursor:pointer;transition:all 0.2s;}
        .btn-kick:hover,.btn-kick:active{background:#e94560;color:#fff;}
        .room-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:10px;width:100%;}
        .btn-room-action{padding:10px 16px;border-radius:10px;border:none;color:#fff;font-size:0.85em;font-weight:bold;cursor:pointer;transition:all 0.2s;flex:1;min-width:80px;}
        .btn-add-bot{background:#f0a500;color:#000;}
        .btn-add-bot:active{background:#c98a00}
        .btn-add-bot:disabled{background:#555;color:#999;opacity:0.5;cursor:not-allowed}
        .btn-copy-code{background:#0f3460;border:1px solid #3a5080;}
        .btn-copy-code:active{background:#1a4a8a}
        .btn-start-game-room{background:linear-gradient(135deg,#e94560,#c73650);flex:2;}
        .btn-start-game-room:active{transform:scale(0.97);background:#c73650}
        .btn-start-game-room:disabled{background:#555;opacity:0.5;cursor:not-allowed}
        .waiting-text{color:#f0a500;font-size:0.85em;margin:5px 0;animation:blink 1.5s infinite;}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:0.5}}

        /* 游戏界面 */
        .game-screen{display:none;}
        .game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
        .game-header h2{font-size:1.4em;color:#e94560;letter-spacing:2px;flex:1;}
        .btn-back{background:transparent;border:1px solid #3a5080;color:#a8b8d0;padding:8px 12px;border-radius:8px;font-size:0.8em;cursor:pointer;}
        .btn-back:active{background:#0f3460;color:#fff}
        .res{display:flex;justify-content:space-around;margin:12px 0;flex-wrap:wrap;gap:8px;}
        .res-item{background:#0f3460;padding:10px 8px;border-radius:10px;flex:1;min-width:55px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.2);}
        .res-item div:first-child{font-size:0.65em;color:#a8b8d0;margin-bottom:3px;}
        .res-item div:last-child{font-size:1.1em;font-weight:bold;color:#e94560;}
        .res-item.player{background:#1a3a20;border:1px solid #4caf84;}
        .res-item.player div:last-child{color:#4caf84;}
        .btn-group{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin:8px 0;}
        .btn{padding:14px 16px;flex:1;min-width:90px;background:#e94560;border:none;border-radius:10px;color:#fff;font-size:0.9em;font-weight:bold;cursor:pointer;transition:all 0.2s ease;box-shadow:0 4px 12px rgba(233,69,96,0.3);-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:manipulation;}
        .btn:active{transform:scale(0.95);background:#c73650}
        .btn-restart{background:#533a7b;box-shadow:0 4px 12px rgba(83,58,123,0.3)}
        .btn-restart:active{background:#3d2a5e}
        .log{margin-top:15px;background:#0a1628;padding:12px;height:160px;overflow-y:auto;text-align:left;border-radius:10px;font-size:0.8em;line-height:1.6;color:#c0d0e0;border:1px solid #1a2a4a;-webkit-overflow-scrolling:touch;}

        /* 进攻弹窗 */
        #attackModal .target-btn{padding:12px;border-radius:10px;border:none;color:#fff;font-size:0.95em;font-weight:bold;cursor:pointer;margin:4px 0;width:100%;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
        .target-list{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow-y:auto;}

        .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#533a7b;color:#fff;padding:12px 25px;border-radius:25px;font-size:0.9em;z-index:999;opacity:0;transition:opacity 0.3s ease;pointer-events:none;}
        .toast.show{opacity:1}

        @media(max-width:360px){
            .btn{padding:12px 6px;font-size:0.78em;min-width:60px}
            .res-item{padding:8px 4px}
            .cover h1{font-size:1.6em}
            .cover-icon{width:100px;height:100px}
            .room-code{font-size:1.5em;letter-spacing:4px}
        }
        @media(min-width:768px){
            .box{padding:30px 25px}
            .btn{min-width:110px;font-size:1em}
            .log{height:180px;font-size:0.9em}
            .cover-icon{width:140px;height:140px}
        }
    </style>
</head>
<body>
    <div class="toast" id="toast"></div>
    <!-- 创建房间弹窗 -->
    <div class="modal-overlay" id="createRoomModal">
        <div class="modal">
            <h3>🏠 创建对战房间</h3>
            <div class="option-row">
                <label>房间人数</label>
                <select id="roomSizeSelect">
                    <option value="2">2 人</option>
                    <option value="3">3 人</option>
                    <option value="4" selected>4 人</option>
                    <option value="5">5 人</option>
                    <option value="6">6 人</option>
                </select>
            </div>
            <button class="btn-confirm" onclick="confirmCreateRoom()">✅ 创建房间</button>
            <button class="btn-cancel" onclick="closeCreateRoomModal()">取消</button>
        </div>
    </div>
    <!-- 加入房间弹窗 -->
    <div class="modal-overlay" id="joinRoomModal">
        <div class="modal">
            <h3>🔍 加入对战房间</h3>
            <div class="option-row col">
                <label style="align-self:flex-start;">输入房间号</label>
                <input type="text" id="joinRoomCodeInput" placeholder="请输入6位房间号" maxlength="6" autocomplete="off" style="letter-spacing:6px;font-size:1.3em;">
            </div>
            <button class="btn-confirm green" onclick="confirmJoinRoom()">🚪 加入房间</button>
            <button class="btn-cancel" onclick="closeJoinRoomModal()">取消</button>
        </div>
    </div>
    <!-- 修改名字弹窗 -->
    <div class="modal-overlay" id="editNameModal">
        <div class="modal">
            <h3>✏️ 修改名字</h3>
            <div class="option-row col">
                <label>输入新名字</label>
                <input type="text" id="editNameInput" placeholder="请输入新名字" maxlength="8" autocomplete="off">
            </div>
            <button class="btn-confirm" onclick="confirmEditName()">✅ 确认修改</button>
            <button class="btn-cancel" onclick="closeEditNameModal()">取消</button>
        </div>
    </div>
    <!-- 踢人确认弹窗 -->
    <div class="modal-overlay" id="kickConfirmModal">
        <div class="modal">
            <h3>⚠️ 确认踢除</h3>
            <p style="color:#c0d0e0;margin:10px 0;">确定要踢除 <b style="color:#e94560;" id="kickTargetName">玩家</b> 吗？</p>
            <p style="color:#a8b8d0;font-size:0.8em;">踢除后该位置将变为空位</p>
            <button class="btn-confirm red" onclick="confirmKick()">🚫 确认踢除</button>
            <button class="btn-cancel" onclick="closeKickConfirmModal()">取消</button>
        </div>
    </div>
    <!-- 进攻选择弹窗 -->
    <div class="modal-overlay" id="attackModal">
        <div class="modal">
            <h3>⚔️ 选择进攻目标</h3>
            <div class="target-list" id="targetList"></div>
            <button class="btn-cancel" onclick="closeAttackModal()">取消</button>
        </div>
    </div>

    <div class="box">
        <!-- 封面 -->
        <div class="cover" id="coverScreen">
            <img src="Black.png" alt="游戏图标" class="cover-icon">
            <h1>回合策略对战</h1>
            <p class="subtitle">多方混战，运筹帷幄</p>
            <div class="tutorial">
                <h3>📖 玩法说明</h3>
                <div class="tutorial-item"><span class="tutorial-icon">⚔️</span><span><b>征兵</b>：消耗20金币，招募10名士兵</span></div>
                <div class="tutorial-item"><span class="tutorial-icon">🏰</span><span><b>筑城</b>：消耗15金币，恢复20城池血量</span></div>
                <div class="tutorial-item"><span class="tutorial-icon">💰</span><span><b>休整</b>：跳过回合，获得30金币</span></div>
                <div class="tutorial-item"><span class="tutorial-icon">💥</span><span><b>进攻</b>：消耗5士兵，选择攻击目标</span></div>
                <div class="tutorial-item"><span class="tutorial-icon">🎯</span><span><b>目标</b>：消灭所有对手即可获胜！</span></div>
            </div>
            <div class="btn-cover-group">
                <button class="btn-start" onclick="startSingleGame()">⚔️ 单人混战</button>
                <button class="btn-create" onclick="openCreateRoomModal()">🏠 创建房间</button>
                <button class="btn-join" onclick="openJoinRoomModal()">🔍 加入房间</button>
            </div>
        </div>

        <!-- 房间界面 -->
        <div class="room-screen" id="roomScreen">
            <div class="room-header">
                <h2>🏠 对战房间</h2>
                <button class="btn-leave-room" onclick="leaveRoom()">🚪 离开</button>
            </div>
            <div class="room-card">
                <p style="color:#a8b8d0;font-size:0.85em;">房间号</p>
                <div class="room-code" id="roomCode">------</div>
                <span class="room-role-badge" id="roomRoleBadge">房主</span>
                <div class="room-info">
                    房间人数上限：<span id="roomMaxPlayers">4</span>人 ｜ 当前人数：<span id="roomCurrentPlayers">1</span>人
                </div>
                <div class="player-list" id="playerList"><h4>👥 玩家列表</h4></div>
            </div>
            <div class="waiting-text" id="waitingText" style="display:none;">等待房主开始游戏...</div>
            <div class="room-actions" id="roomActions">
                <button class="btn-room-action btn-copy-code" onclick="copyRoomCode()">📋 复制房间号</button>
                <button class="btn-room-action btn-add-bot" onclick="addBot()" id="btnAddBot">🤖 添加人机</button>
                <button class="btn-room-action btn-start-game-room" onclick="startGameFromRoom()" id="btnStartGameRoom">⚔️ 开始游戏</button>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div class="game-screen" id="gameScreen">
            <div class="game-header">
                <button class="btn-back" onclick="backToCover()">← 返回</button>
                <h2>⚔️ 多方混战</h2>
            </div>
            <div class="res" id="gameResTop"></div>
            <div class="res" id="gameResBottom"></div>
            <div class="btn-group">
                <button class="btn" onclick="recruit()">征兵<br><small>+10兵 -20金</small></button>
                <button class="btn" onclick="build()">筑城<br><small>+20城防 -15金</small></button>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="rest()">休整<br><small>+30金币</small></button>
                <button class="btn" onclick="openAttackModal()">选择进攻</button>
            </div>
            <div class="btn-group">
                <button class="btn btn-restart" onclick="restartGame()">🔄 重新开始</button>
            </div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        // ========== 全局元素 ==========
        const coverScreen = document.getElementById('coverScreen');
        const roomScreen = document.getElementById('roomScreen');
        const gameScreen = document.getElementById('gameScreen');
        const createRoomModal = document.getElementById('createRoomModal');
        const joinRoomModal = document.getElementById('joinRoomModal');
        const editNameModal = document.getElementById('editNameModal');
        const kickConfirmModal = document.getElementById('kickConfirmModal');
        const attackModal = document.getElementById('attackModal');
        const toast = document.getElementById('toast');

        let toastTimer;
        function showToast(msg){
            toast.innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ========== 共享内存（用于本地模拟联机） ==========
        // 这里我们使用一个简单的对象来存房间。只在同一个浏览器里有效。
        const localRoomsDB = new Map();

        // ========== 界面切换 ==========
        function startSingleGame(){
            roomConfig = {
                code: 'SOLO',
                maxPlayers: 3,
                isHost: true,
                players: [
                    { name: '你', type: 'host' },
                    { name: '敌方', type: 'bot' },
                    { name: '中立', type: 'bot' }
                ]
            };
            initGameWithPlayers();
            gameScreen.style.display = 'block';
            coverScreen.style.display = 'none';
            roomScreen.style.display = 'none';
        }

        function backToCover(){
            gameScreen.style.display = 'none';
            roomScreen.style.display = 'none';
            coverScreen.style.display = 'flex';
        }

        // ========== 弹窗 ==========
        function openCreateRoomModal(){ createRoomModal.classList.add('show'); }
        function closeCreateRoomModal(){ createRoomModal.classList.remove('show'); }
        function confirmCreateRoom(){
            const size = parseInt(document.getElementById('roomSizeSelect').value);
            createRoom(size);
            closeCreateRoomModal();
        }
        function openJoinRoomModal(){
            document.getElementById('joinRoomCodeInput').value = '';
            joinRoomModal.classList.add('show');
            setTimeout(() => document.getElementById('joinRoomCodeInput').focus(), 300);
        }
        function closeJoinRoomModal(){ joinRoomModal.classList.remove('show'); }
        function confirmJoinRoom(){
            const code = document.getElementById('joinRoomCodeInput').value.trim().toUpperCase();
            if(code.length < 4){ showToast('⚠️ 请输入有效的房间号'); return; }
            joinRoom(code);
            closeJoinRoomModal();
        }

        // ========== 修改名字弹窗 ==========
        let editingPlayerIndex = -1;
        function openEditNameModal(index){
            editingPlayerIndex = index;
            document.getElementById('editNameInput').value = roomConfig.players[index].name;
            editNameModal.classList.add('show');
            setTimeout(() => document.getElementById('editNameInput').focus(), 300);
        }
        function closeEditNameModal(){
            editNameModal.classList.remove('show');
            editingPlayerIndex = -1;
        }
        function confirmEditName(){
            const newName = document.getElementById('editNameInput').value.trim();
            if(!newName){
                showToast('⚠️ 名字不能为空');
                return;
            }
            if(newName.length > 8){
                showToast('⚠️ 名字不能超过8个字符');
                return;
            }
            if(editingPlayerIndex >= 0 && editingPlayerIndex < roomConfig.players.length){
                roomConfig.players[editingPlayerIndex].name = newName;
                // 更新本地数据库中的房间信息
                if(roomConfig.code && localRoomsDB.has(roomConfig.code)){
                    const roomInDB = localRoomsDB.get(roomConfig.code);
                    if(roomInDB.players[editingPlayerIndex]){
                        roomInDB.players[editingPlayerIndex].name = newName;
                    }
                }
                showToast('✅ 名字已修改！');
                updateRoomUI();
            }
            closeEditNameModal();
        }

        // ========== 踢人确认弹窗 ==========
        let kickingPlayerIndex = -1;
        function openKickConfirmModal(index){
            if(!roomConfig.isHost){ showToast('⚠️ 只有房主可以踢人'); return; }
            const p = roomConfig.players[index];
            if(p.type === 'host'){ showToast('⚠️ 不能踢除房主'); return; }
            kickingPlayerIndex = index;
            document.getElementById('kickTargetName').innerText = p.name;
            kickConfirmModal.classList.add('show');
        }
        function closeKickConfirmModal(){
            kickConfirmModal.classList.remove('show');
            kickingPlayerIndex = -1;
        }
        function confirmKick(){
            if(kickingPlayerIndex >= 0 && kickingPlayerIndex < roomConfig.players.length){
                const kickedName = roomConfig.players[kickingPlayerIndex].name;
                roomConfig.players.splice(kickingPlayerIndex, 1);
                // 更新本地数据库
                if(roomConfig.code && localRoomsDB.has(roomConfig.code)){
                    const roomInDB = localRoomsDB.get(roomConfig.code);
                    roomInDB.players = [...roomConfig.players]; // 同步数据库
                }
                showToast('🚫 已踢除 ' + kickedName);
                updateRoomUI();
            }
            closeKickConfirmModal();
        }

        // ========== 房间逻辑（改进版，带共享内存） ==========
        let roomConfig = { code: '', maxPlayers: 4, isHost: true, players: [] };

        // 创建一个唯一的客户端ID，用于区分不同窗口/标签页
        const clientId = Math.random().toString(36).substring(2, 8);
        console.log('当前客户端ID:', clientId);

        function createRoom(maxPlayers){
            const code = Math.random().toString(36).substring(2, 8).toUpperCase();
            
            const newRoom = {
                code: code,
                maxPlayers: maxPlayers,
                hostId: clientId,
                players: [{ name: '房主', type: 'host', clientId: clientId }]
            };
            
            // 存入本地“数据库”
            localRoomsDB.set(code, newRoom);
            
            // 设置当前客户端的房间状态
            roomConfig = {
                code: code,
                maxPlayers: maxPlayers,
                isHost: true,
                players: newRoom.players
            };
            
            enterRoomScreen();
            showToast('✅ 房间创建成功！');
        }

        function joinRoom(code){
            const roomInDB = localRoomsDB.get(code);
            
            if (!roomInDB) {
                showToast('⚠️ 房间不存在或已关闭');
                return;
            }
            
            if (roomInDB.players.length >= roomInDB.maxPlayers) {
                showToast('⚠️ 房间已满');
                return;
            }
            
            // 检查是否已经在房间中
            const alreadyInRoom = roomInDB.players.some(p => p.clientId === clientId);
            if (alreadyInRoom) {
                showToast('⚠️ 你已经在房间中');
                return;
            }
            
            const newPlayer = { name: '新成员', type: 'self', clientId: clientId };
            roomInDB.players.push(newPlayer);
            
            // 设置为当前客户端的房间配置
            roomConfig = {
                code: code,
                maxPlayers: roomInDB.maxPlayers,
                isHost: false,
                players: roomInDB.players
            };
            
            enterRoomScreen();
            showToast('✅ 成功加入房间！');
        }

        function enterRoomScreen(){
            updateRoomUI();
            coverScreen.style.display = 'none';
            roomScreen.style.display = 'flex';
            gameScreen.style.display = 'none';
        }

        function addBot(){
            if(!roomConfig.isHost){ showToast('⚠️ 只有房主可以添加人机'); return; }
            if(roomConfig.players.length >= roomConfig.maxPlayers){ showToast('⚠️ 房间已满'); return; }
            const botName = '人机 ' + (roomConfig.players.length);
            const newBot = { name: botName, type: 'bot', clientId: 'bot-' + Math.random() };
            roomConfig.players.push(newBot);
            
            // 更新数据库
            if(localRoomsDB.has(roomConfig.code)){
                localRoomsDB.get(roomConfig.code).players = [...roomConfig.players];
            }
            
            showToast('🤖 已添加人机！');
            updateRoomUI();
        }

        function leaveRoom(){
            if(roomConfig.code && localRoomsDB.has(roomConfig.code)){
                const roomInDB = localRoomsDB.get(roomConfig.code);
                // 如果不是单人模式，需要从数据库中移除自己
                if(roomConfig.code !== 'SOLO'){
                    roomInDB.players = roomInDB.players.filter(p => p.clientId !== clientId);
                    if(roomInDB.players.length === 0){
                        localRoomsDB.delete(roomConfig.code);
                    }
                }
            }
            
            roomConfig = { code: '', maxPlayers: 4, isHost: true, players: [] };
            roomScreen.style.display = 'none';
            coverScreen.style.display = 'flex';
            showToast('🚪 已离开房间');
        }

        function refreshRoomFromDB(){
            if(roomConfig.code && localRoomsDB.has(roomConfig.code)){
                const roomInDB = localRoomsDB.get(roomConfig.code);
                roomConfig.players = roomInDB.players;
                updateRoomUI();
            }
        }

        function updateRoomUI(){
            // 先尝试从数据库中获取最新的玩家列表
            if(roomConfig.code && localRoomsDB.has(roomConfig.code)){
                const roomInDB = localRoomsDB.get(roomConfig.code);
                roomConfig.players = roomInDB.players;
            }
            
            document.getElementById('roomCode').innerText = roomConfig.code || '------';
            document.getElementById('roomMaxPlayers').innerText = roomConfig.maxPlayers;
            document.getElementById('roomCurrentPlayers').innerText = roomConfig.players.length;
            const badge = document.getElementById('roomRoleBadge');
            if(roomConfig.isHost){ badge.innerText = '房主'; badge.className = 'room-role-badge role-host'; }
            else{ badge.innerText = '成员'; badge.className = 'room-role-badge role-member'; }

            const listContainer = document.getElementById('playerList');
            let html = '<h4>👥 玩家列表 <span style="font-size:0.7em;color:#a8b8d0;">（点击名字可修改）</span></h4>';
            
            roomConfig.players.forEach((p, index) => {
                let slotClass = '', tagClass = '', tagText = '';
                let isSelf = false;
                
                // 判断是否是当前客户端
                const isCurrentClient = p.clientId === clientId;
                
                switch(p.type){
                    case 'host':
                        slotClass = 'host';
                        tagClass = 'tag-host';
                        tagText = '房主';
                        isSelf = isCurrentClient;
                        break;
                    case 'self':
                        slotClass = 'self';
                        tagClass = 'tag-self';
                        tagText = '你';
                        isSelf = true;
                        break;
                    case 'bot':
                        slotClass = 'bot';
                        tagClass = 'tag-bot';
                        tagText = '人机';
                        break;
                    default:
                        slotClass = 'other';
                        tagClass = 'tag-player';
                        tagText = '玩家';
                }

                const canEdit = isSelf;
                const canKick = roomConfig.isHost && p.type !== 'host' && !isSelf;

                html += `<div class="player-slot ${slotClass}">
                    <div class="player-info ${canEdit ? 'editable' : ''}" onclick="${canEdit ? `openEditNameModal(${index})` : ''}" title="${canEdit ? '点击修改名字' : ''}">
                        <span>${escapeHtml(p.name)}</span>
                        ${canEdit ? '<span class="edit-icon">✎</span>' : ''}
                    </div>
                    <div class="player-actions">
                        <span class="player-tag ${tagClass}">${tagText}</span>
                        ${canKick ? `<button class="btn-kick" onclick="event.stopPropagation();openKickConfirmModal(${index})" title="踢出">✕</button>` : ''}
                    </div>
                </div>`;
            });
            
            for(let i=roomConfig.players.length; i<roomConfig.maxPlayers; i++){
                html += `<div class="player-slot empty"><span>空位 ${i+1}</span><span class="player-tag tag-waiting">等待中</span></div>`;
            }
            listContainer.innerHTML = html;
            updateRoomButtons();
        }

        function escapeHtml(text){
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function updateRoomButtons(){
            const addBotBtn = document.getElementById('btnAddBot');
            const startBtn = document.getElementById('btnStartGameRoom');
            const waitingText = document.getElementById('waitingText');
            if(!roomConfig.isHost){
                addBotBtn.style.display = 'none';
                startBtn.style.display = 'none';
                waitingText.style.display = 'block';
            }else{
                addBotBtn.style.display = 'block';
                startBtn.style.display = 'block';
                waitingText.style.display = 'none';
                if(roomConfig.players.length >= roomConfig.maxPlayers){
                    addBotBtn.disabled = true; addBotBtn.style.opacity = '0.5'; addBotBtn.style.cursor = 'not-allowed';
                }else{
                    addBotBtn.disabled = false; addBotBtn.style.opacity = '1'; addBotBtn.style.cursor = 'pointer';
                }
            }
        }

        function startGameFromRoom(){
            if(!roomConfig.isHost){ showToast('⚠️ 只有房主可以开始游戏'); return; }
            if(roomConfig.players.length < 2){ showToast('⚠️ 至少需要2名玩家'); return; }
            initGameWithPlayers();
            gameScreen.style.display = 'block';
            roomScreen.style.display = 'none';
            coverScreen.style.display = 'none';
        }

        function copyRoomCode(){
            if(!roomConfig.code){ showToast('⚠️ 请先创建房间'); return; }
            if(navigator.clipboard){
                navigator.clipboard.writeText(roomConfig.code).then(() => showToast('📋 房间号已复制！')).catch(() => fallbackCopy(roomConfig.code));
            }else{ fallbackCopy(roomConfig.code); }
        }
        function fallbackCopy(text){
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            try{ document.execCommand('copy'); showToast('📋 房间号已复制！'); }catch(e){ showToast('⚠️ 复制失败，请手动记录'); }
            document.body.removeChild(ta);
        }

        // ========== 游戏核心 ==========
        const factionColors = ['#e94560', '#4caf84', '#3a80d0', '#f0a500', '#9b59b6', '#1abc9c'];
        let playerFactions = [];
        let gameOver = false;
        let playerIndex = 0;

        function initGameWithPlayers(){
            playerFactions = [];
            roomConfig.players.forEach((p, i) => {
                const isPlayer = (p.type === 'host' || p.type === 'self');
                playerFactions.push({
                    name: p.name,
                    hp: 100,
                    soldier: 20,
                    gold: 50,
                    color: factionColors[i % factionColors.length],
                    isPlayer: isPlayer,
                    isAlive: true
                });
                if(isPlayer) playerIndex = i;
            });
            gameOver = false;
            document.getElementById('log').innerHTML = '';
            addLog('🏰 ===== ' + playerFactions.length + '方混战开始！请选择行动 =====');
            updateGameUI();
        }

        function updateGameUI(){
            const topRes = document.getElementById('gameResTop');
            let me = playerFactions[playerIndex];
            if(me && me.isAlive){
                topRes.innerHTML = `
                    <div class="res-item player"><div>🏰 ${me.name}</div><div>${me.hp}</div></div>
                    <div class="res-item player"><div>💰 金币</div><div>${me.gold}</div></div>
                    <div class="res-item player"><div>⚔️ 士兵</div><div>${me.soldier}</div></div>
                `;
            }else{
                topRes.innerHTML = '<div style="color:#e94560;width:100%;">你已被消灭</div>';
            }

            const bottomRes = document.getElementById('gameResBottom');
            let html = '';
            playerFactions.forEach((f, i) => {
                if(i === playerIndex) return;
                if(!f.isAlive) return;
                const bgColor = hexToRgba(f.color, 0.2);
                html += `
                    <div class="res-item" style="background:${bgColor};border:1px solid ${f.color};">
                        <div>🏯 ${f.name}</div>
                        <div style="color:${f.color};">${f.hp}</div>
                    </div>
                    <div class="res-item" style="background:${bgColor};border:1px solid ${f.color};">
                        <div>🛡️ ${f.name}兵</div>
                        <div style="color:${f.color};">${f.soldier}</div>
                    </div>
                `;
            });
            if(html === '') html = '<div style="color:#4caf84;width:100%;">没有其他存活势力</div>';
            bottomRes.innerHTML = html;
        }

        function hexToRgba(hex, alpha){
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function addLog(text){
            const log = document.getElementById('log');
            log.innerHTML += text + '<br>';
            log.scrollTop = log.scrollHeight;
        }

        function getPlayerFaction(){ return playerFactions[playerIndex]; }
        function getAliveEnemies(){ return playerFactions.filter((f, i) => i !== playerIndex && f.isAlive); }

        function recruit(){
            if(gameOver) return;
            let me = getPlayerFaction();
            if(!me || !me.isAlive) return;
            if(me.gold >= 20){
                me.gold -= 20;
                me.soldier += 10;
                addLog(`✅ 你花费20金币，征召10名士兵！`);
                updateGameUI();
                aiTurns();
            }else{ addLog('❌ 金币不足，无法征兵！'); }
        }

        function build(){
            if(gameOver) return;
            let me = getPlayerFaction();
            if(!me || !me.isAlive) return;
            if(me.gold >= 15){
                me.gold -= 15;
                me.hp += 20;
                addLog(`🏰 你花费15金币，加固城池20点血量！`);
                updateGameUI();
                aiTurns();
            }else{ addLog('❌ 金币不足，无法筑城！'); }
        }

        function rest(){
            if(gameOver) return;
            let me = getPlayerFaction();
            if(!me || !me.isAlive) return;
            me.gold += 30;
            addLog('💰 你选择休整，获得30金币！');
            updateGameUI();
            aiTurns();
        }

        function openAttackModal(){
            if(gameOver) return;
            let me = getPlayerFaction();
            if(!me || !me.isAlive) return;
            if(me.soldier < 5){ addLog('⚠️ 士兵太少，不敢进攻！'); return; }
            const targets = getAliveEnemies();
            if(targets.length === 0){ addLog('⚠️ 没有可以进攻的目标！'); return; }
            const targetList = document.getElementById('targetList');
            let html = '';
            targets.forEach(t => {
                const idx = playerFactions.indexOf(t);
                html += `<button class="target-btn" style="background:${t.color};" onclick="confirmAttack(${idx})">
                    🏯 进攻 ${t.name}<br><small>血量：${t.hp} | 士兵：${t.soldier}</small>
                </button>`;
            });
            targetList.innerHTML = html;
            attackModal.classList.add('show');
        }

        function closeAttackModal(){ attackModal.classList.remove('show'); }

        function confirmAttack(targetIdx){
            closeAttackModal();
            let me = getPlayerFaction();
            if(!me || !me.isAlive) return;
            if(me.soldier < 5) return;
            const target = playerFactions[targetIdx];
            if(!target || !target.isAlive) return;
            const hurt = Math.floor(me.soldier * 0.8);
            me.soldier -= 5;
            target.hp -= hurt;
            addLog(`⚔️ 你派出士兵进攻<b>${target.name}</b>，造成${hurt}点伤害，损失5名士兵！`);
            updateGameUI();
            checkGameOver();
        }

        function aiTurns(){
            if(gameOver) return;
            for(let i=0; i<playerFactions.length; i++){
                if(gameOver) break;
                const f = playerFactions[i];
                if(i === playerIndex) continue;
                if(!f.isAlive) continue;
                aiAction(f, i);
                checkGameOver();
            }
            if(!gameOver) updateGameUI();
        }

        function aiAction(faction, factionIdx){
            const ran = Math.random();
            const aliveTargets = playerFactions.filter((f, i) => i !== factionIdx && f.isAlive);
            if(faction.soldier >= 5 && aliveTargets.length > 0 && ran < 0.4){
                const target = aliveTargets[Math.floor(Math.random() * aliveTargets.length)];
                const hurt = Math.floor(faction.soldier * 0.7);
                faction.soldier -= 3;
                target.hp -= hurt;
                const targetName = target.isPlayer ? '你' : target.name;
                addLog(`💥 ${faction.name}发动进攻，${targetName}受到${hurt}点伤害！`);
            }else if(ran < 0.7){
                faction.soldier += 8;
                addLog(`🛡️ ${faction.name}正在征召士兵！`);
            }else{
                faction.hp += 15;
                addLog(`🏯 ${faction.name}加固了城池！`);
            }
            updateGameUI();
        }

        function checkGameOver(){
            playerFactions.forEach(f => { if(f.hp <= 0){ f.hp = 0; f.isAlive = false; } });
            const me = getPlayerFaction();
            if(me && !me.isAlive && !gameOver){
                addLog('💀 ===== 你已被消灭，游戏失败 =====');
                gameOver = true;
                updateGameUI();
                return;
            }
            const aliveOthers = playerFactions.filter((f, i) => i !== playerIndex && f.isAlive);
            if(aliveOthers.length === 0 && me && me.isAlive && !gameOver){
                addLog('🎉 ===== 恭喜你，消灭了所有对手，游戏胜利！=====');
                gameOver = true;
                updateGameUI();
                return;
            }
            updateGameUI();
        }

        function restartGame(){
            if(roomConfig.players.length >= 2){ initGameWithPlayers(); }
            else{ startSingleGame(); }
            updateGameUI();
        }
    </script>
</body>
</html>
